<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Lingos Sarkrox</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@400;600&display=swap');

body {
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #e2e8f0;
  font-family: 'Inter', Arial;
  margin: 0;
  padding: 10px;
}

h2 {
  text-align: center;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 1px;
  margin-bottom: 20px;
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.05);
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
  text-align: center;
  background: #0f172a;
  color: white;
  font-weight: bold;
}

button {
  background: linear-gradient(90deg, #22c55e, #16a34a);
  border: none;
  padding: 12px;
  width: 100%;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
}

.label {
  font-size: 13px;
  opacity: 0.7;
  margin-top: 10px;
}

.big {
  font-size: 18px;
  margin-top: 8px;
  font-weight: 600;
}

/* 🎯 COLORES */

.compra {
  color: #ef4444;
  font-weight: bold;
}

.venta {
  color: #22c55e;
  font-weight: bold;
}

.actual {
  color: #3b82f6;
  font-weight: bold;
}

.promedio {
  color: #facc15;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>📊 Trading Lingos Sarkrox</h2>

<div class="container">

  <!-- CALCULADORA -->
  <div class="card">
    <h3>Calculadora</h3>

    <input id="lingos" type="number" placeholder="Cantidad de lingos">

    <div class="label">Precio USDT por Lingo</div>
    <input id="precioUSDT" type="number" value="2">

    <div class="label">Precio COP por USDT</div>
    <input id="precioCOP" type="number">

    <button onclick="calcular()">Calcular</button>

    <div class="big">Créditos: <span id="creditos"></span></div>
    <div class="big">USDT: <span id="usdtTotal"></span></div>
    <div class="big">COP: <span id="copTotal"></span></div>
  </div>

  <!-- MERCADO -->
  <div class="card">
    <h3>💱 Mercado</h3>

    <div class="label">Precio actual</div>
    <div class="actual" id="textoMercado">Cargando...</div>

    <div class="label">P2P Compra</div>
    <div class="compra" id="p2pCompra">...</div>

    <div class="label">P2P Venta</div>
    <div class="venta" id="p2pVenta">...</div>

    <div class="label">Promedio</div>
    <div class="promedio" id="p2pPromedio">...</div>
  </div>

</div>

<script>

let precioActual = 0;

// 🔥 Obtener precios
async function obtenerPrecios() {
  try {

    // wake up render
    await fetch("https://lingos-api.onrender.com/");

    let res = await fetch("https://lingos-api.onrender.com/precio/p2p");
    let data = await res.json();

    if (data.promedio) {

      precioActual = data.promedio;

      document.getElementById("p2pCompra").innerText =
        data.compra.toLocaleString() + " COP";

      document.getElementById("p2pVenta").innerText =
        data.venta.toLocaleString() + " COP";

      document.getElementById("p2pPromedio").innerText =
        data.promedio.toLocaleString() + " COP";

      document.getElementById("textoMercado").innerText =
        "1 USDT ≈ " + data.promedio.toLocaleString() + " COP";

      // autollenar input si está vacío
      let inputCOP = document.getElementById("precioCOP");
      if (!inputCOP.value) {
        inputCOP.value = data.promedio;
      }
    }

  } catch (e) {
    console.log("Error:", e);
  }
}

// 🔥 cálculo
function calcular() {

  let lingos = parseFloat(document.getElementById("lingos").value) || 0;
  let usdt = parseFloat(document.getElementById("precioUSDT").value) || 0;
  let cop = parseFloat(document.getElementById("precioCOP").value) || 0;

  let creditos = lingos * 50;
  let totalUSDT = lingos * usdt;
  let totalCOP = totalUSDT * cop;

  document.getElementById("creditos").innerText = creditos;
  document.getElementById("usdtTotal").innerText = totalUSDT.toFixed(2);
  document.getElementById("copTotal").innerText =
    totalCOP.toLocaleString();
}

// init
obtenerPrecios();
setInterval(obtenerPrecios, 30000);

</script>

</body>
</html>
